<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>E.T. Llamar Casa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    min-height: 100vh;
    font-family: 'Special Elite', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    width: 390px;
    margin: 0 auto;
  }

  /* Starfield */
  #stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(1); }
    to   { opacity: 0.9; transform: scale(1.4); }
  }

  header {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 36px 20px 12px;
    width: 100%;
  }
  header h1 {
    font-size: 2.2rem;
    color: #e8a44a;
    letter-spacing: 0.18em;
    text-shadow: 0 0 18px #e8a44a88, 0 0 40px #e8a44a44;
  }
  header p {
    color: #7ab4c8;
    font-size: 0.78rem;
    margin-top: 4px;
    letter-spacing: 0.1em;
    opacity: 0.7;
  }

  /* ET Image container */
  #et-container {
    position: relative;
    z-index: 2;
    width: 340px;
    margin: 18px auto 0;
    cursor: pointer;
    border-radius: 22px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px #e8a44a44,
      0 0 30px #e8a44a33,
      0 12px 60px #00000088;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #et-container:active {
    transform: scale(0.97);
    box-shadow: 0 0 0 3px #e8a44a99, 0 0 50px #e8a44a66;
  }
  #et-container img {
    width: 100%;
    display: block;
    border-radius: 22px;
    pointer-events: none;
  }

  /* Pulse ring on click */
  #et-container::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 22px;
    border: 3px solid #e8a44a;
    opacity: 0;
    transition: opacity 0.08s;
  }
  #et-container.clicked::after {
    opacity: 1;
    animation: ring-fade 0.5s ease-out forwards;
  }
  @keyframes ring-fade {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.04); }
  }

  /* Tap hint */
  #tap-hint {
    color: #7ab4c888;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-align: center;
    margin-top: 8px;
    z-index: 2;
    position: relative;
    animation: pulse-hint 2.4s ease-in-out infinite;
  }
  @keyframes pulse-hint {
    0%,100% { opacity: 0.4; } 50% { opacity: 0.9; }
  }

  /* Speech bubble */
  #speech-wrap {
    position: relative;
    z-index: 10;
    width: 320px;
    margin: 22px auto 0;
    display: none;
  }
  #speech-wrap.visible { display: block; }

  #speech-bubble {
    background: rgba(10, 20, 35, 0.93);
    border: 1.5px solid #e8a44a88;
    border-radius: 18px;
    padding: 20px 22px;
    position: relative;
    box-shadow: 0 0 24px #e8a44a33, 0 4px 30px #00000066;
    backdrop-filter: blur(10px);
  }
  /* Triangle pointing up toward ET */
  #speech-bubble::before {
    content: '';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-bottom-color: #e8a44a88;
  }
  #speech-bubble::after {
    content: '';
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: rgba(10, 20, 35, 0.93);
  }

  #speech-text {
    color: #e8d9b8;
    font-size: 1.15rem;
    line-height: 1.55;
    text-align: center;
    letter-spacing: 0.05em;
    min-height: 2.5rem;
  }

  /* Glowing globe icon */
  #globe-icon {
    display: block;
    margin: 8px auto 0;
    width: 28px;
    height: 28px;
    opacity: 0.5;
  }


  footer {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #3a5a6a;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    padding: 10px 0 30px;
  }

  /* Finger glow effect on image */
  #finger-glow {
    position: absolute;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffddaacc 0%, transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 5;
    mix-blend-mode: screen;
  }
  #et-container.clicked #finger-glow {
    opacity: 1;
    animation: glow-fade 0.7s ease-out forwards;
  }
  @keyframes glow-fade {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(2.5); }
  }
</style>
</head>

// ── ET Sound (Ben Burtt inspired — croaky wheezing synth) ──
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playETSound() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0, now);
  master.gain.linearRampToValueAtTime(0.55, now + 0.08);
  master.gain.linearRampToValueAtTime(0.45, now + 0.4);
  master.gain.linearRampToValueAtTime(0.0, now + 1.6);
  master.connect(ctx.destination);

  // Main voice oscillator — croaky
  function makeVoiceLayer(freq, gainVal, detune, type) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const filt = ctx.createBiquadFilter();

    osc.type = type || 'sawtooth';
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.linearRampToValueAtTime(freq * 1.18, now + 0.15);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.72, now + 0.6);
    osc.frequency.linearRampToValueAtTime(freq * 0.85, now + 1.0);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.4, now + 1.55);
    osc.detune.setValueAtTime(detune, now);

    filt.type = 'bandpass';
    filt.frequency.setValueAtTime(900, now);
    filt.frequency.linearRampToValueAtTime(1400, now + 0.2);
    filt.frequency.linearRampToValueAtTime(700, now + 1.0);
    filt.Q.value = 3.5;

    g.gain.setValueAtTime(gainVal, now);

    osc.connect(filt);
    filt.connect(g);
    g.connect(master);
    osc.start(now);
    osc.stop(now + 1.65);
  }

  makeVoiceLayer(140, 0.6, 0, 'sawtooth');
  makeVoiceLayer(138, 0.3, -22, 'sawtooth');
  makeVoiceLayer(145, 0.2, 14, 'square');

  // Wheeze / breath layer
  const noise = ctx.createOscillator();
  const noiseFilter = ctx.createBiquadFilter();
  const noiseGain = ctx.createGain();
  noise.type = 'sawtooth';
  noise.frequency.setValueAtTime(320, now);
  noise.frequency.linearRampToValueAtTime(200, now + 0.5);
  noise.frequency.exponentialRampToValueAtTime(100, now + 1.5);
  noiseFilter.type = 'highpass';
  noiseFilter.frequency.value = 600;
  noiseGain.gain.setValueAtTime(0, now);
  noiseGain.gain.linearRampToValueAtTime(0.14, now + 0.1);
  noiseGain.gain.linearRampToValueAtTime(0.0, now + 1.6);
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(master);
  noise.start(now);
  noise.stop(now + 1.65);

  // Croak pulse (LFO modulated)
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.setValueAtTime(8, now);
  lfo.frequency.linearRampToValueAtTime(4, now + 0.8);
  lfoGain.gain.value = 45;
  lfo.connect(lfoGain);

  const croakOsc = ctx.createOscillator();
  const croakFilt = ctx.createBiquadFilter();
  const croakGain = ctx.createGain();
  croakOsc.type = 'sawtooth';
  croakOsc.frequency.setValueAtTime(155, now);
  croakOsc.frequency.linearRampToValueAtTime(90, now + 1.2);
  lfoGain.connect(croakOsc.frequency);
  croakFilt.type = 'peaking';
  croakFilt.frequency.value = 800;
  croakFilt.gain.value = 12;
  croakGain.gain.setValueAtTime(0, now);
  croakGain.gain.linearRampToValueAtTime(0.3, now + 0.05);
  croakGain.gain.linearRampToValueAtTime(0.0, now + 1.6);
  croakOsc.connect(croakFilt);
  croakFilt.connect(croakGain);
  croakGain.connect(master);
  croakOsc.start(now);
  croakOsc.stop(now + 1.65);
  lfo.start(now);
  lfo.stop(now + 1.65);
}

// ── Typewriter effect ──────────────────────────────────────
function typewrite(el, text, speed) {
  el.textContent = '';
  let i = 0;
  const iv = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(iv);
  }, speed || 60);
}

// ── Main click handler ─────────────────────────────────────
let lastClickTime = 0;

function handleETClick(e) {
  const now = Date.now();
  if (now - lastClickTime < 400) return; // debounce
  lastClickTime = now;

  // Glow at click position
  const rect = document.getElementById('et-container').getBoundingClientRect();
  const glow = document.getElementById('finger-glow');
  glow.style.left = (e.clientX - rect.left) + 'px';
  glow.style.top  = (e.clientY - rect.top) + 'px';

  const container = document.getElementById('et-container');
  container.classList.remove('clicked');
  void container.offsetWidth;
  container.classList.add('clicked');

  setTimeout(() => container.classList.remove('clicked'), 600);

  // Play sound
  try { playETSound(); } catch(err) { console.warn('Audio error:', err); }

  // Show phrase
  const wrap = document.getElementById('speech-wrap');
  const textEl = document.getElementById('speech-text');
  wrap.classList.add('visible');
  typewrite(textEl, getPhrase(), 55);
}
